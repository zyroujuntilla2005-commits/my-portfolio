<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    form {
      background: #ffcce0;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 400px;
    }
    h2 {
      text-align: center;
      color: #d63384;
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-top: 5px;
      font-size: 14px;
    }
    input[type="radio"], input[type="checkbox"] {
      width: auto;
      margin-right: 4px;
    }
    button {
      width: 100%;
      background: #ff5ca8;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      margin-top: 15px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #ff3e9d; }
  </style>
</head>
<body>
  <form onsubmit="return validateForm()">
    <h2>Registration Form</h2>

    <label>First Name</label>
    <input type="text" required>

    <label>Last Name</label>
    <input type="text" required>

    <label>Date of Birth (DD-MM-YYYY)</label>
    <input type="text" placeholder="DD-MM-YYYY" required pattern="^(0[1-9]|[12][0-9]|3[01])-(0[1-9]|1[012])-[0-9]{4}$">

    <label>Gender:</label>
    <input type="radio" name="gender" required> Male
    <input type="radio" name="gender" required> Female

    <label>Religion</label>
    <select required>
      <option value="">--Select--</option>
      <option>Catholic</option>
      <option>Christian</option>
      <option>Muslim</option>
      <option>Others</option>
    </select>

    <label>Username (5–12 chars)</label>
    <input type="text" required minlength="5" maxlength="12">

    <label>Password (8–16 chars)</label>
    <input type="password" id="password" required minlength="8" maxlength="16">

    <label>Confirm Password</label>
    <input type="password" id="confirm" required minlength="8" maxlength="16">

    <label>Email</label>
    <input type="email" required>

    <label>Mobile Number</label>
    <input type="text" required pattern="[0-9]+">

    <label>Language Spoken:</label>
    <input type="checkbox"> Cebuano
    <input type="checkbox"> Tagalog
    <input type="checkbox"> English
    <input type="checkbox"> Others

    <label>Address</label>
    <textarea rows="3" required></textarea>

    <label>Upload File/Image</label>
    <input type="file" accept=".jpg,.jpeg,.png,.pdf" required>

    <button type="submit">Submit</button>
  </form>

  <script>
    function validateForm() {
      const p = document.getElementById("password").value;
      const c = document.getElementById("confirm").value;
      if (p !== c) { alert("Passwords do not match!"); return false; }
      alert("Registration was successfully submitted!");
      return true;
    }
  </script>
</body>
</html>
